<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyNotes - Premium Log</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --bg-gradient: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%);
            --surface: rgba(30, 41, 59, 0.6);
            --surface-light: rgba(71, 85, 105, 0.3);
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #6366f1; 
            --primary-glow: rgba(99, 102, 241, 0.4);
            --personal: #818cf8;
            --work: #fbbf24;
            --secret: #f87171;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.5;
            padding-bottom: 100px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px var(--primary-glow); border-color: var(--surface-light); }
            50% { box-shadow: 0 0 15px var(--primary-glow); border-color: var(--primary); }
            100% { box-shadow: 0 0 5px var(--primary-glow); border-color: var(--surface-light); }
        }

        header {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-bottom: 1px solid var(--surface-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header div:first-child {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .composer {
            background: var(--surface);
            backdrop-filter: blur(10px);
            margin: 20px 15px;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--surface-light);
            transition: all 0.3s ease;
        }

        .composer:focus-within {
            animation: pulseGlow 3s infinite;
        }

        .comp-top { display: flex; gap: 10px; margin-bottom: 15px; }

        .chip {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: var(--surface-light);
            color: var(--muted);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chip.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 16px;
            min-height: 80px;
            resize: none;
            margin-top: 10px;
        }

        .composer-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            border-top: 1px solid var(--surface-light);
            padding-top: 15px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.95); }

        /* Search & Filters */
        .search-box { margin: 0 15px 15px; position: relative; }
        .search-box input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--surface-light);
            padding: 14px 16px 14px 45px;
            border-radius: 16px;
            color: var(--text);
            transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); background: rgba(30,41,59,0.9); }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted); }

        .filters {
            padding: 0 15px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-btn {
            padding: 10px 20px;
            background: var(--surface);
            border: 1px solid var(--surface-light);
            color: var(--muted);
            border-radius: 50px;
            white-space: nowrap;
            transition: 0.3s;
        }
        .filter-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        /* Logs List */
        .note-card {
            background: var(--surface);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 20px;
            margin: 0 15px 15px;
            border: 1px solid var(--surface-light);
            position: relative;
            animation: slideUpFade 0.5s ease forwards;
            transition: 0.3s ease;
        }
        .note-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.8);
        }

        .note-category {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 12px;
        }
        .note-personal { background: rgba(129, 140, 248, 0.15); color: var(--personal); }
        .note-work     { background: rgba(251, 191, 36, 0.15); color: var(--work); }
        .note-secret   { background: rgba(248, 113, 113, 0.15); color: var(--secret); }

        .note-text { font-size: 16px; color: #f1f5f9; margin-bottom: 15px; }
        .note-time { font-size: 11px; color: var(--muted); }

        .note-actions {
            position: absolute; top: 20px; right: 20px;
            display: flex; gap: 15px; color: var(--muted);
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--surface-light);
            display: flex; justify-content: space-around;
            padding: 15px 0 25px;
            z-index: 100;
        }
        .nav-item { text-align: center; color: var(--muted); font-size: 11px; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }

        /* Modal */
        .modal {
            position: fixed; inset: 0;
            background: rgba(2, 6, 23, 0.8);
            display: none; align-items: flex-end;
            z-index: 1000; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #1e293b; width: 100%; max-width: 500px; margin: 0 auto;
            border-radius: 32px 32px 0 0; padding: 30px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal.show { display: flex; }
        .modal.show .modal-content { transform: translateY(0); }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--primary); color: white;
            padding: 12px 24px; border-radius: 50px;
            opacity: 0; transition: 0.3s; z-index: 2000;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header>
        <div>MyNotes</div>
        <div style="display:flex; gap:10px;">
            <button onclick="showStats()" style="background:var(--surface-light); padding:8px 15px;"><i class="fas fa-chart-line"></i></button>
            <button onclick="exportData()" style="background:var(--surface-light); padding:8px 15px;"><i class="fas fa-file-export"></i></button>
        </div>
    </header>

    <div class="composer">
        <div class="comp-top">
            <div class="chip active" data-cat="Personal" onclick="selectCategory(this)">Personal</div>
            <div class="chip" data-cat="Work" onclick="selectCategory(this)">Work</div>
            <div class="chip" data-cat="Secret" onclick="selectCategory(this)">Secret</div>
        </div>
        <textarea id="note-txt" placeholder="Apa yang terjadi hari ini?" oninput="autoResize(this)"></textarea>
        <div class="composer-foot">
            <span id="char-ct" style="font-size:12px; color:var(--muted)">0 karakter</span>
            <button onclick="saveEntry()">Simpan Log</button>
        </div>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-in" placeholder="Cari memori..." oninput="renderLogs()">
    </div>

    <div class="filters">
        <div class="filter-btn active" data-f="All" onclick="setFilter(this)">Semua <span id="count-all">0</span></div>
        <div class="filter-btn" data-f="Personal" onclick="setFilter(this)">Personal</div>
        <div class="filter-btn" data-f="Work" onclick="setFilter(this)">Work</div>
        <div class="filter-btn" data-f="Secret" onclick="setFilter(this)">Secret</div>
    </div>

    <div id="logs-list"></div>

    <div class="bottom-bar">
        <div class="nav-item active"><i class="fas fa-layer-group"></i><div>Logs</div></div>
        <div class="nav-item" onclick="document.getElementById('import-file').click()"><i class="fas fa-cloud-download-alt"></i><div>Restore</div></div>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <div id="toast" class="toast"></div>

    <div class="modal" id="stats-modal" onclick="if(event.target==this) closeStats()">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; font-weight:800;">Statistik Vault</h2>
            <div style="display:flex; flex-direction:column; gap:15px; background:rgba(0,0,0,0.2); padding:20px; border-radius:20px;">
                <div style="display:flex; justify-content:space-between;">
                    <span style="color:var(--muted)">Total Memori</span>
                    <b id="stat-total" style="color:var(--primary)">0</b>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span style="color:var(--muted)">Ukuran Data</span>
                    <b id="stat-size">0 KB</b>
                </div>
            </div>
            <div style="margin-top:30px; display:flex; gap:12px;">
                <button onclick="clearAll()" style="flex:1; background:#ef4444;">Format Vault</button>
                <button onclick="closeStats()" style="flex:1; background:var(--surface-light);">Tutup</button>
            </div>
        </div>
    </div>

<script>
const DB_NAME = "indigo_vault_db";
let currentFilter = "All";
let currentCategory = "Personal";

const getDB = () => JSON.parse(localStorage.getItem(DB_NAME) || "[]");
const saveDB = (data) => localStorage.setItem(DB_NAME, JSON.stringify(data));

function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }

function selectCategory(el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentCategory = el.dataset.cat;
}

function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
    document.getElementById('char-ct').textContent = `${textarea.value.length} karakter`;
}

function saveEntry() {
    const ta = document.getElementById("note-txt");
    const txt = ta.value.trim();
    if (!txt) return;

    const db = getDB();
    db.unshift({
        id: uid(),
        content: txt,
        cat: currentCategory,
        ts: Date.now(),
        time: new Date().toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })
    });
    saveDB(db);
    ta.value = "";
    autoResize(ta);
    renderLogs();
    updateCounters();
    toast("Memori diamankan ke vault");
}

function renderLogs() {
    const db = getDB();
    const container = document.getElementById("logs-list");
    const query = document.getElementById("search-in").value.toLowerCase();

    let items = currentFilter === "All" ? db : db.filter(item => item.cat === currentFilter);
    if (query) items = items.filter(item => item.content.toLowerCase().includes(query));

    if (items.length === 0) {
        container.innerHTML = `<div style="text-align:center; color:var(--muted); padding:100px 20px; animation: slideUpFade 0.5s;">Vault masih kosong.</div>`;
        return;
    }

    container.innerHTML = items.map((item, idx) => `
        <div class="note-card" style="animation-delay: ${idx * 0.05}s">
            <div class="note-category note-${item.cat.toLowerCase()}">${item.cat}</div>
            <div class="note-actions">
                <i class="fas fa-copy" onclick="copyEntry('${item.id}')"></i>
                <i class="fas fa-trash-alt" onclick="deleteEntry('${item.id}')" style="color:#f87171"></i>
            </div>
            <div class="note-text">${item.content.replace(/\n/g, '<br>')}</div>
            <div class="note-time"><i class="far fa-clock"></i> ${item.time}</div>
        </div>
    `).join("");
}

function deleteEntry(id) {
    if (!confirm("Hapus memori ini?")) return;
    saveDB(getDB().filter(x => x.id !== id));
    renderLogs();
    updateCounters();
    toast("Entri dihapus");
}

function copyEntry(id) {
    const item = getDB().find(x => x.id === id);
    if (item) navigator.clipboard.writeText(item.content).then(() => toast("Teks disalin"));
}

function setFilter(el) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentFilter = el.dataset.f;
    renderLogs();
}

function updateCounters() {
    document.getElementById('count-all').textContent = getDB().length;
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}

function showStats() {
    const modal = document.getElementById("stats-modal");
    document.getElementById("stat-total").textContent = getDB().length;
    const size = new Blob([localStorage.getItem(DB_NAME) || ""]).size;
    document.getElementById("stat-size").textContent = (size / 1024).toFixed(1) + " KB";
    modal.style.display = "flex";
    setTimeout(() => modal.classList.add("show"), 10);
}

function closeStats() {
    const modal = document.getElementById("stats-modal");
    modal.classList.remove("show");
    setTimeout(() => modal.style.display = "none", 400);
}

function exportData() {
    const db = getDB();
    if (!db.length) return toast("Vault kosong");
    const blob = new Blob([JSON.stringify(db, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `vault_backup_${Date.now()}.json`;
    a.click();
    toast("Backup berhasil diunduh");
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            saveDB(JSON.parse(ev.target.result));
            renderLogs(); updateCounters();
            toast("Restorasi berhasil");
        } catch(err) { toast("File tidak valid"); }
    };
    reader.readAsText(file);
}

function clearAll() {
    if (confirm("Hapus SEMUA data secara permanen?")) {
        localStorage.removeItem(DB_NAME);
        renderLogs(); updateCounters(); closeStats();
        toast("Vault dikosongkan");
    }
}

window.onload = () => { renderLogs(); updateCounters(); };
</script>
</body>
</html>
